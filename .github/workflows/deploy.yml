name: Deploy

on:
  push:
    branches:
      - develop       # auto deploys to QA
      - staging       # auto deploys to Stage
      - main          # auto deploys to Prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Decide environment based on branch
      - name: Set environment name
        id: set_env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            echo "env_name=qa" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            echo "env_name=stage" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "env_name=prod" >> $GITHUB_OUTPUT
          fi

      # 1. Create GitHub Deployment
      - name: Create GitHub Deployment
        id: create_deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: '${{ steps.set_env.outputs.env_name }}',
              auto_merge: false,
              required_contexts: []
            });
            core.setOutput('deployment_id', deployment.data.id);

      # 2. YOUR REAL DEPLOY COMMAND (replace this with Vercel / AWS / etc.)
      - name: Deploy application
        run: |
          echo "Deploying to ${{ steps.set_env.outputs.env_name }}..."
          # e.g. vercel deploy --prod
          # e.g. aws s3 sync ...
          # e.g. kubectl apply ...

      # 3. Mark success → Playwright workflow fires automatically
      - name: Mark deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create_deployment.outputs.deployment_id }},
              state: 'success'
            });

      # 4. Mark failure → Playwright will NOT run
      - name: Mark deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create_deployment.outputs.deployment_id }},
              state: 'failure'
            });