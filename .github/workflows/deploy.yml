name: Deploy

on:
  push:
    branches:
      - develop
      - staging
      - main

permissions:
  deployments: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set environment name
        id: set_env
        shell: bash
        run: |
          REF="${{ github.ref }}"
          if [ "$REF" = "refs/heads/develop" ]; then
            echo "env_name=qa" >> $GITHUB_OUTPUT
          elif [ "$REF" = "refs/heads/staging" ]; then
            echo "env_name=stage" >> $GITHUB_OUTPUT
          elif [ "$REF" = "refs/heads/main" ]; then
            echo "env_name=prod" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Deployment
        id: create_deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: '${{ steps.set_env.outputs.env_name }}',
              auto_merge: false,
              required_contexts: []
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Deploy application
        run: |
          echo "Deploying to ${{ steps.set_env.outputs.env_name }}..."

      - name: Mark deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create_deployment.outputs.deployment_id }},
              state: 'success'
            });

      - name: Mark deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create_deployment.outputs.deployment_id }},
              state: 'failure'
            });